services:
  - type: web
    name: budget-app-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: APP_NAME
        value: Budget App API
      - key: API_V1_PREFIX
        value: /api/v1
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: DATABASE_URL
        fromDatabase:
          name: budget-app-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      # Update these after first deploy to your actual frontend URL, e.g.
      # https://budget-app-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://budget-app-frontend.onrender.com
      - key: CORS_ORIGINS
        value: https://budget-app-frontend.onrender.com

  - type: web
    name: budget-app-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    autoDeploy: true
    envVars:
      # Update if your backend service URL differs.
      - key: VITE_API_BASE_URL
        value: https://budget-app-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: budget-app-db
    plan: free
    databaseName: budget_app
    user: budget_app_user
